<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>Fitcket Viewer</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    #remote{position:absolute;inset:0}
    #remote video{width:100%!important;height:100%!important;object-fit:cover!important}
    #status{position:absolute;left:12px;top:12px;z-index:10;background:rgba(0,0,0,0.6);color:#fff;padding:10px 12px;border-radius:12px;font-weight:900;font-size:12px}
  </style>
</head>
<body>
  <div id="remote"></div>
  <div id="status">Loading…</div>

  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    const APP_ID = qs.get('appId');
    const CHANNEL = qs.get('channel');
    const TOKEN = qs.get('token') || null;
    const UID = qs.get('uid') ? Number(qs.get('uid')) : null;

    const statusEl = document.getElementById('status');
    const setStatus = (t) => statusEl.textContent = t;

    async function init() {
      try {
        if (!APP_ID || !CHANNEL) throw new Error('Missing appId/channel');
        setStatus('Joining…');

        const client = AgoraRTC.createClient({ mode: 'live', codec: 'vp8' });
        await client.setClientRole('audience');
        await client.join(APP_ID, CHANNEL, TOKEN, UID);

        setStatus('Waiting for host…');

        client.on('user-published', async (user, mediaType) => {
          await client.subscribe(user, mediaType);
          if (mediaType === 'video') {
            user.videoTrack.play('remote');
            setStatus('Watching video');
          }
          if (mediaType === 'audio') {
            user.audioTrack.play();
            setStatus('Hearing audio');
          }
        });

      } catch (e) {
        setStatus('Error: ' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
