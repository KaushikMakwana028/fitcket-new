<!DOCTYPE html> <html> <head>   <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />  
  <title>Fitcket Live Host</title>   
  
  <style>     * { margin:0; padding:0; box-sizing:border-box; }     html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; }     #root { position:relative; width:100vw; height:100vh; background:#000; }     #local { position:absolute; inset:0; z-index:1; }     #local video { width:100%!important; height:100%!important; object-fit:cover!important; background:#000!important; }     /* Let overlays be clickable (video should not steal touches) */     #local, #local * { pointer-events:none; }     #hud {       position:absolute;       left:12px; right:12px;       top: calc(12px + env(safe-area-inset-top, 0px));       z-index:9999;       background: rgba(0,0,0,0.55);       color:#fff;       padding:10px 12px;       border-radius:12px;       font-size:12px;       font-weight:900;     }     #status {       position:absolute;       left:50%;       transform: translateX(-50%);       bottom: calc(120px + env(safe-area-inset-bottom, 0px));       z-index:9999;       background: rgba(0,0,0,0.65);       color:#fff;       padding:10px 14px;       border-radius:999px;       font-size:12px;       font-weight:900;       max-width:92vw;       text-align:center;       pointer-events:none;     }     #controls {       position:absolute;       left:12px; right:12px;       bottom: calc(14px + env(safe-area-inset-bottom, 0px));       z-index:10000;       display:flex;       justify-content:center;       gap:10px;       pointer-events:auto;     }     button {       pointer-events:auto;       border:1px solid rgba(255,255,255,0.2);       background: rgba(255,255,255,0.14);       color:#fff;       padding:12px 16px;       border-radius:999px;       font-weight:900;       font-size:13px;       backdrop-filter: blur(8px);     }     #end { background: rgba(220,38,38,0.92); border-color: rgba(220,38,38,0.92); }   </style> </head> <body>   <div id="root">     <div id="local"></div>     <div id="hud">booting…</div>     <div id="status">Loading…</div>     <div id="controls">       <button id="mute">Mute</button>       <button id="camera">Camera Off</button>       <button id="flip">Flip</button>       <button id="end">End</button>     </div>   </div>   <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>   <script>     const qs = new URLSearchParams(location.search);     const APP_ID = qs.get('appId');     const CHANNEL = qs.get('channel');     const TOKEN = qs.get('token') || null;     const UID = qs.get('uid') ? Number(qs.get('uid')) : null;     const hudEl = document.getElementById('hud');     const statusEl = document.getElementById('status');     const muteBtn = document.getElementById('mute');     const camBtn  = document.getElementById('camera');     const flipBtn = document.getElementById('flip');     const endBtn  = document.getElementById('end');     let client = null;     let audioTrack = null;     let videoTrack = null;     let muted = false;     let camOff = false;     function hud(t){ hudEl.textContent = t; console.log('[HUD]', t); }     function status(t){ statusEl.textContent = t; console.log('[STATUS]', t); }     function send(type, payload = {}) {       const msg = { type, ...payload };       console.log('[SEND]', msg);       if (window.ReactNativeWebView?.postMessage) {         window.ReactNativeWebView.postMessage(JSON.stringify(msg));       }     }     // heartbeat to prove JS runs + messaging works     setInterval(() => send('ping', { t: Date.now() }), 1000);     window.addEventListener('error', (e) => send('error', { message: 'WindowError: ' + (e.message || 'unknown') }));     send('ready', { href: location.href });     hud('ready');     async function init() {       try {         hud('params');         send('params', { appId: APP_ID, channel: CHANNEL, hasToken: !!TOKEN, uid: UID });         if (!APP_ID || !CHANNEL) throw new Error('Missing appId/channel in query params');         status('Creating client…');         client = AgoraRTC.createClient({ mode: 'live', codec: 'vp8' });         client.on('connection-state-change', (cur, prev) => send('connection-state-changed', { state: cur, prevState: prev }));         await client.setClientRole('host');         status('Joining…');         await client.join(APP_ID, CHANNEL, TOKEN, UID);         send('joined', { channel: CHANNEL, uid: UID });         hud('joined');         status('Mic…');         try {           audioTrack = await AgoraRTC.createMicrophoneAudioTrack();         } catch (e) {           send('error', { message: 'Microphone failed: ' + e.message });         }         status('Camera…');         try {           videoTrack = await AgoraRTC.createCameraVideoTrack({ facingMode: 'user' });           videoTrack.play('local');         } catch (e) {           send('error', { message: 'Camera failed: ' + e.message });         }         send('tracks-created', { audio: !!audioTrack, video: !!videoTrack });         hud(`tracks a=${audioTrack?1:0} v=${videoTrack?1:0}`);         const tracks = [];         if (audioTrack) tracks.push(audioTrack);         if (videoTrack) tracks.push(videoTrack);         if (!tracks.length) throw new Error('No tracks created');         status('Publishing…');         await client.publish(tracks);         send('published', { audio: !!audioTrack, video: !!videoTrack });         hud('published');         status('🔴 LIVE');       } catch (e) {         hud('error');         status('Error: ' + (e.message || e));         send('error', { message: e.message || String(e) });       }     }     muteBtn.onclick = async () => {       if (!audioTrack) return;       muted = !muted;       await audioTrack.setEnabled(!muted);       muteBtn.textContent = muted ? 'Unmute' : 'Mute';       send('mute-changed', { muted });     };     camBtn.onclick = async () => {       if (!videoTrack) return;       camOff = !camOff;       await videoTrack.setEnabled(!camOff);       camBtn.textContent = camOff ? 'Camera On' : 'Camera Off';       send('camera-changed', { camOff });     };     flipBtn.onclick = async () => {       if (!videoTrack) return;       try {         const cams = await AgoraRTC.getCameras();         if (!cams || cams.length < 2) return;         const current = videoTrack.getTrackLabel();         const idx = cams.findIndex(c => c.label === current);         const next = (idx + 1) % cams.length;         await videoTrack.setDevice(cams[next].deviceId);         send('camera-flipped');       } catch (e) {         send('error', { message: 'Flip failed: ' + e.message });       }     };     async function leave() {       try {         status('Leaving…');         if (audioTrack) { audioTrack.stop(); audioTrack.close(); }         if (videoTrack) { videoTrack.stop(); videoTrack.close(); }         if (client) await client.leave();         send('left');       } catch (e) {         send('error', { message: 'Leave failed: ' + e.message });       }     }     endBtn.onclick = async () => { await leave(); send('end-clicked'); };     window.leaveChannel = leave;     init();   </script> </body> </html>
